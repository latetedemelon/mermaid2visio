name: CI

on:
  push:
    branches: [ master, main, 'claude/**' ]
  pull_request:
    branches: [ master, main ]
  workflow_dispatch:

# Cancel superseded runs on the same branch/PR to save CI minutes
# and avoid confusing the README badge with stale results.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Principle of least privilege. No job writes to the repo.
permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    strategy:
      fail-fast: false
      matrix:
        node-version: [18.x, 20.x, 22.x]

    steps:
    - uses: actions/checkout@v4

    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    # libreoffice-draw + libvisio enable the VSDX round-trip render test
    # (tests/render_libreoffice.test.ts). The suite auto-skips when soffice
    # isn't on PATH, so this step is what flips the render check on in CI.
    - name: Install LibreOffice (for VSDX render test)
      run: sudo apt-get update && sudo apt-get install -y --no-install-recommends libreoffice-draw

    - name: Build
      run: npm run build

    - name: Test with coverage
      run: npm run test:coverage

    - name: Write coverage to job summary
      if: always()
      run: |
        if [ -f coverage/coverage-summary.json ]; then
          node -e "
            const s = require('./coverage/coverage-summary.json').total;
            const row = (k) => \`| \${k} | \${s[k].pct}% | \${s[k].covered}/\${s[k].total} |\`;
            const md = [
              '### Coverage (Node ${{ matrix.node-version }})',
              '',
              '| Metric | % | Covered / Total |',
              '|---|---|---|',
              row('statements'),
              row('branches'),
              row('functions'),
              row('lines'),
              ''
            ].join('\n');
            require('fs').appendFileSync(process.env.GITHUB_STEP_SUMMARY, md);
          "
        else
          echo "No coverage-summary.json produced." >> "$GITHUB_STEP_SUMMARY"
        fi

    - name: Upload coverage artifact
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: coverage-node-${{ matrix.node-version }}
        path: coverage/
        if-no-files-found: ignore
        retention-days: 14

  # Aggregate gate so branch protection only needs to watch a single check
  # regardless of how the matrix evolves.
  ci-ok:
    if: always()
    needs: [build]
    runs-on: ubuntu-latest
    steps:
      - name: Fail if any matrix job failed
        run: |
          if [ "${{ needs.build.result }}" != "success" ]; then
            echo "build job reported: ${{ needs.build.result }}"
            exit 1
          fi
